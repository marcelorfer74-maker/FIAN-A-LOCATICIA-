<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fiança Locatícia Pro - Marcelo Fernandes</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004691">
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/fianca/192/192">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Alpine.js for State Management -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input:focus { outline: none; border-color: #004691; ring: 2px #004691; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-10" x-data="app()" x-cloak>

    <div class="max-w-md mx-auto px-4 pt-6">
        
        <!-- Header -->
        <header class="bg-[#004691] p-6 rounded-3xl text-white mb-6 shadow-lg relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-1">
                    <i data-lucide="shield-check" class="w-6 h-6 text-amber-400"></i>
                    <h1 class="text-xl font-extrabold italic tracking-tighter uppercase">Mestre Seguro360</h1>
                </div>
                <p class="text-[10px] font-bold text-amber-300 uppercase tracking-widest">Consultoria Marcelo Fernandes | SUSEP: 3H032J</p>
            </div>
            <i data-lucide="key" class="absolute -right-4 -bottom-4 w-24 h-24 opacity-10 rotate-12 text-white"></i>
        </header>

        <!-- Form -->
        <div class="space-y-6">

            <!-- Bloco Usuário e Atendimento -->
            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-sm font-bold uppercase tracking-tight flex items-center gap-2 text-[#004691] mb-4">
                    <i data-lucide="user-cog" class="w-4 h-4"></i> Usuário e Atendimento
                </h2>
                <div class="grid gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Tipo de Usuário</label>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button @click="userType = 'Cliente'; attendantName = 'Atendimento'" :class="userType === 'Cliente' ? 'bg-[#004691] text-white' : 'bg-slate-100 text-slate-500'" class="py-2 rounded-xl text-xs font-bold transition-all">Cliente</button>
                            <button @click="userType = 'Imobiliária'" :class="userType === 'Imobiliária' ? 'bg-[#004691] text-white' : 'bg-slate-100 text-slate-500'" class="py-2 rounded-xl text-xs font-bold transition-all">Imobiliária</button>
                        </div>
                    </div>
                    
                    <div x-show="userType === 'Imobiliária'" x-transition class="animate-in fade-in slide-in-from-top-2 duration-300">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Atendente</label>
                        <select x-model="attendantName" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm mt-1">
                            <option value="Beth">Beth</option>
                            <option value="Otalivio">Otalivio</option>
                            <option value="Paulo">Paulo</option>
                            <option value="Ribera">Ribera</option>
                            <option value="Atendimento">Atendimento</option>
                        </select>
                    </div>
                </div>
            </section>
            
            <!-- Locatários Section -->
            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-bold uppercase tracking-tight flex items-center gap-2 text-[#004691]">
                        <i data-lucide="users" class="w-4 h-4"></i> Locatários
                    </h2>
                    <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-full font-bold text-slate-500" x-text="tenants.length + '/5'"></span>
                </div>

                <div class="space-y-4">
                    <template x-for="(tenant, index) in tenants" :key="index">
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 relative animate-in fade-in slide-in-from-top-2 duration-300">
                            <button @click="removeTenant(index)" x-show="tenants.length > 1" class="absolute -top-2 -right-2 bg-white text-red-500 p-1.5 rounded-full shadow-md hover:bg-red-50 transition-colors">
                                <i data-lucide="x" class="w-3 h-3"></i>
                            </button>
                            
                            <div class="grid gap-3">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nome Completo</label>
                                    <input type="text" x-model="tenant.name" placeholder="Ex: João Silva" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm">
                                </div>
                                <div class="grid grid-cols-1 gap-3">
                                    <div>
                                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">CPF *</label>
                                        <input type="tel" x-model="tenant.cpf" @input="maskCPF($event, index)" placeholder="000.000.000-00" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm" inputmode="numeric">
                                    </div>
                                    <div>
                                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">E-mail *</label>
                                        <input type="email" x-model="tenant.email" placeholder="email@exemplo.com" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm">
                                    </div>
                                    <div>
                                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Celular/WhatsApp *</label>
                                        <input type="tel" x-model="tenant.phone" @input="maskPhone($event, index)" placeholder="(00) 00000-0000" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm" inputmode="tel">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <button @click="addTenant" x-show="tenants.length < 5" class="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-xs font-bold hover:border-[#004691] hover:text-[#004691] transition-all flex items-center justify-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Adicionar Locatário
                    </button>
                </div>
            </section>

            <!-- Imóvel Section -->
            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-sm font-bold uppercase tracking-tight flex items-center gap-2 text-[#004691] mb-4">
                    <i data-lucide="home" class="w-4 h-4"></i> Dados do Imóvel
                </h2>
                
                <div class="grid gap-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">CEP *</label>
                            <input type="tel" x-model="property.cep" @input="maskCEP($event)" placeholder="00000-000" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm" inputmode="numeric">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Tipo</label>
                            <select x-model="property.type" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm">
                                <option value="Residencial">Residencial</option>
                                <option value="Comercial">Comercial</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Número</label>
                            <input type="text" x-model="property.number" placeholder="123" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Complemento</label>
                            <input type="text" x-model="property.complement" placeholder="Apto 10" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Código Flex</label>
                        <input type="text" x-model="property.flexCode" placeholder="Opcional" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm">
                    </div>
                </div>
            </section>

            <!-- Financeiro Section -->
            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-sm font-bold uppercase tracking-tight flex items-center gap-2 text-[#004691] mb-4">
                    <i data-lucide="dollar-sign" class="w-4 h-4"></i> Valores Mensais
                </h2>
                
                <div class="grid gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Aluguel *</label>
                        <input type="tel" x-model="values.rent" @input="maskCurrency($event, 'rent')" placeholder="R$ 0,00" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold text-[#004691]" inputmode="numeric">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">IPTU</label>
                            <input type="tel" x-model="values.iptu" @input="maskCurrency($event, 'iptu')" placeholder="R$ 0,00" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm" inputmode="numeric">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Condomínio</label>
                            <input type="tel" x-model="values.condo" @input="maskCurrency($event, 'condo')" placeholder="R$ 0,00" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm" inputmode="numeric">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Actions -->
            <div class="grid gap-3 pt-2">
                <button @click="sendWhatsApp" class="w-full bg-[#004691] text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    <i data-lucide="send" class="w-5 h-5"></i> Enviar via WhatsApp
                </button>
                <button @click="clearForm" class="w-full bg-white text-slate-400 py-3 rounded-2xl font-bold border border-slate-200 text-xs active:scale-95 transition-transform">
                    Limpar Formulário
                </button>
            </div>

        </div>

        <!-- Footer Info -->
        <footer class="mt-8 text-center">
            <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">© 2026 Marcelo Fernandes | Especialista em Seguros</p>
        </footer>
    </div>

    <script>
        function app() {
            return {
                userType: 'Cliente',
                attendantName: 'Atendimento',
                tenants: [{ name: '', cpf: '', email: '', phone: '' }],
                property: { cep: '', type: 'Residencial', number: '', complement: '', flexCode: '' },
                values: { rent: '', iptu: '', condo: '' },
                
                init() {
                    lucide.createIcons();
                },

                addTenant() {
                    if (this.tenants.length < 5) {
                        this.tenants.push({ name: '', cpf: '', email: '', phone: '' });
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                removeTenant(index) {
                    this.tenants.splice(index, 1);
                },

                maskCPF(e, index) {
                    let v = e.target.value.replace(/\D/g, '');
                    v = v.replace(/(\d{3})(\d)/, '$1.$2');
                    v = v.replace(/(\d{3})(\d)/, '$1.$2');
                    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                    this.tenants[index].cpf = v.substring(0, 14);
                },

                maskPhone(e, index) {
                    let v = e.target.value.replace(/\D/g, '');
                    v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                    v = v.replace(/(\d)(\d{4})$/, '$1-$2');
                    this.tenants[index].phone = v.substring(0, 15);
                },

                maskCEP(e) {
                    let v = e.target.value.replace(/\D/g, '');
                    v = v.replace(/^(\d{5})(\d)/, '$1-$2');
                    this.property.cep = v.substring(0, 9);
                },

                maskCurrency(e, field) {
                    let v = e.target.value.replace(/\D/g, '');
                    v = (v / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    this.values[field] = v;
                },

                clearForm() {
                    if(confirm('Deseja realmente limpar todos os campos?')) {
                        this.userType = 'Cliente';
                        this.attendantName = 'Atendimento';
                        this.tenants = [{ name: '', cpf: '', email: '', phone: '' }];
                        this.property = { cep: '', type: 'Residencial', number: '', complement: '', flexCode: '' };
                        this.values = { rent: '', iptu: '', condo: '' };
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                sendWhatsApp() {
                    // Validation
                    const emptyTenant = this.tenants.some(t => !t.cpf || !t.email || !t.phone);
                    if (emptyTenant || !this.property.cep || !this.values.rent) {
                        alert('Por favor, preencha todos os campos obrigatórios (*)');
                        return;
                    }

                    let tenantText = '';
                    this.tenants.forEach((t, i) => {
                        tenantText += `👤 *LOCATÁRIO ${i+1}:*\n`;
                        tenantText += `Nome: ${t.name || '-'}\n`;
                        tenantText += `CPF: ${t.cpf}\n`;
                        tenantText += `E-mail: ${t.email}\n`;
                        tenantText += `Cel: ${t.phone}\n\n`;
                    });

                    const message = `*NOVA ANÁLISE: MESTRE SEGURO360*\n\n` +
                        `👤 *USUÁRIO:* ${this.userType}\n` +
                        `🎧 *ATENDENTE:* ${this.attendantName}\n\n` +
                        tenantText +
                        `🏠 *DADOS DO IMÓVEL:*\n` +
                        `Tipo: ${this.property.type}\n` +
                        `CEP: ${this.property.cep}\n` +
                        `Número: ${this.property.number || '-'}\n` +
                        `Comp: ${this.property.complement || '-'}\n` +
                        `Código Flex: ${this.property.flexCode || '-'}\n\n` +
                        `💰 *VALORES MENSAIS:*\n` +
                        `Aluguel: ${this.values.rent}\n` +
                        `IPTU: ${this.values.iptu || 'R$ 0,00'}\n` +
                        `Condomínio: ${this.values.condo || 'R$ 0,00'}\n\n` +
                        `_Enviado via Mestre Seguro360 - Marcelo Fernandes_`;

                    const phone = '5515996367478';
                    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
                }
            }
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
