<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ribera Fiança Locatícia</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004691">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        input:focus, select:focus { outline: none; border-color: #004691; border-width: 2px; }
        [x-cloak] { display: none !important; }
        .porto-blue { background-color: #004691; }
        .porto-text { color: #004691; }
    </style>
</head>
<body class="min-h-screen pb-10" x-data="app()" x-cloak>

    <div class="max-w-md mx-auto px-4 pt-6">
        
        <header class="porto-blue p-8 rounded-[32px] text-white mb-6 shadow-xl relative overflow-hidden flex flex-col items-center text-center border-b-4 border-amber-400">
            <div class="relative z-10">
                <h1 class="text-4xl font-black tracking-tighter leading-none uppercase">RIBERA</h1>
                <p class="text-xs font-bold uppercase tracking-[0.3em] mt-1 text-white/90">Corretora</p>
                <div class="h-[1px] w-12 bg-amber-400 mx-auto my-3"></div>
                <p class="text-lg font-medium lowercase tracking-tight text-amber-300 italic">fiança locatícia</p>
            </div>
            <i class="fas fa-shield-halved absolute -right-4 -bottom-4 w-24 h-24 opacity-10 rotate-12 text-white"></i>
        </header>

        <div class="space-y-4">

            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-slate-400 mb-4">
                    <i class="fas fa-user-cog porto-text"></i> Perfil de Atendimento
                </h2>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <button type="button" @click="userType = 'Cliente'; attendantName = 'Atendimento'" :class="userType === 'Cliente' ? 'porto-blue text-white shadow-md' : 'bg-slate-50 text-slate-400'" class="py-3 rounded-xl text-[11px] font-black uppercase transition-all">Cliente</button>
                    <button type="button" @click="userType = 'Imobiliária'" :class="userType === 'Imobiliária' ? 'porto-blue text-white shadow-md' : 'bg-slate-50 text-slate-400'" class="py-3 rounded-xl text-[11px] font-black uppercase transition-all">Imobiliária</button>
                </div>
                
                <div x-show="userType === 'Imobiliária'" x-transition class="mt-2">
                    <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Selecione o Atendente</label>
                    <select x-model="attendantName" class="w-full bg-slate-100 border border-slate-200 rounded-xl px-3 py-3 text-sm font-bold text-slate-700 mt-1 appearance-none">
                        <option value="Beth">Beth</option>
                        <option value="Otalivio">Otalivio</option>
                        <option value="Paulo">Paulo</option>
                        <option value="Ribera">Ribera</option>
                        <option value="Atendimento">Atendimento Geral</option>
                    </select>
                </div>
            </section>
            
            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400">1. Locatários</h2>
                    <span class="text-[9px] porto-blue px-3 py-1 rounded-full font-black text-white" x-text="tenants.length + '/5'"></span>
                </div>

                <div class="space-y-4">
                    <template x-for="(tenant, index) in tenants" :key="index">
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 relative">
                            <button type="button" @click="removeTenant(index)" x-show="tenants.length > 1" class="absolute -top-2 -right-2 bg-white text-red-500 p-2 rounded-full shadow-md border active:scale-90">
                                <i class="fas fa-trash-can text-xs"></i>
                            </button>
                            <div class="grid gap-3">
                                <input type="text" x-model="tenant.name" placeholder="Nome do proponente" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm">
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="tel" x-model="tenant.cpf" @input="maskCPF($event, index)" placeholder="CPF *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm" maxlength="14">
                                    <input type="tel" x-model="tenant.phone" @input="maskPhone($event, index)" placeholder="WhatsApp *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm" maxlength="15">
                                </div>
                                <input type="email" x-model="tenant.email" placeholder="E-mail *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm">
                            </div>
                        </div>
                    </template>
                    <button type="button" @click="addTenant" x-show="tenants.length < 5" class="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-[10px] font-black uppercase flex items-center justify-center gap-2">
                        <i class="fas fa-plus"></i> Adicionar Locatário
                    </button>
                </div>
            </section>

            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">2. Dados do Imóvel</h2>
                <div class="grid gap-3">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="tel" x-model="property.cep" @input="maskCEP($event)" placeholder="CEP *" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm" maxlength="9">
                        <select x-model="property.type" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm font-bold text-slate-700">
                            <option value="Residencial">Residencial</option>
                            <option value="Comercial">Comercial</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" x-model="property.number" placeholder="Número" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm">
                        <input type="text" x-model="property.complement" placeholder="Comp./Apto" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm">
                    </div>
                    <input type="text" x-model="property.flexCode" placeholder="Código Flex (Porto)" class="w-full bg-amber-50 border border-amber-100 rounded-xl px-3 py-3 text-sm italic">
                </div>
            </section>

            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">3. Valores</h2>
                <div class="grid gap-3">
                    <label class="text-[9px] font-black porto-text uppercase ml-1">Aluguel Bruto *</label>
                    <input type="tel" x-model="values.rent" @input="maskCurrency($event, 'rent')" placeholder="R$ 0,00" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-4 text-xl font-black porto-text" inputmode="numeric">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="tel" x-model="values.iptu" @input="maskCurrency($event, 'iptu')" placeholder="IPTU R$" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm" inputmode="numeric">
                        <input type="tel" x-model="values.condo" @input="maskCurrency($event, 'condo')" placeholder="Cond. R$" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm" inputmode="numeric">
                    </div>
                </div>
            </section>

            <div class="pt-4 space-y-3">
                <button type="button" @click="sendWhatsApp" class="w-full porto-blue text-white py-5 rounded-3xl font-black uppercase italic shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i class="fab fa-whatsapp text-xl"></i> Solicitar via Ribera
                </button>
                <button type="button" @click="clearForm" class="w-full text-slate-300 py-2 font-bold text-[9px] uppercase tracking-widest text-center">Resetar Formulário</button>
            </div>
        </div>

        <footer class="mt-8 text-center pb-10">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Ribera Corretora | Marcelo Fernandes</p>
            <p class="text-[8px] text-slate-300 font-bold uppercase mt-1">SUSEP: 3H032J</p>
        </footer>
    </div>

    <script>
        function app() {
            return {
                userType: 'Cliente',
                attendantName: 'Atendimento',
                tenants: [{ name: '', cpf: '', email: '', phone: '' }],
                property: { cep: '', type: 'Residencial', number: '', complement: '', flexCode: '' },
                values: { rent: '', iptu: '', condo: '' },
                
                addTenant() { if (this.tenants.length < 5) this.tenants.push({ name: '', cpf: '', email: '', phone: '' }); },
                removeTenant(index) { this.tenants.splice(index, 1); },
                
                maskCPF(e, index) {
                    let v = e.target.value.replace(/\D/g, '');
                    v = v.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                    this.tenants[index].cpf = v.substring(0, 14);
                },
                maskPhone(e, index) {
                    let v = e.target.value.replace(/\D/g, '');
                    v = v.replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d)(\d{4})$/, '$1-$2');
                    this.tenants[index].phone = v.substring(0, 15);
                },
                maskCEP(e) {
                    let v = e.target.value.replace(/\D/g, '');
                    this.property.cep = v.replace(/^(\d{5})(\d)/, '$1-$2').substring(0, 9);
                },
                maskCurrency(e, field) {
                    let v = e.target.value.replace(/\D/g, '');
                    this.values[field] = (v / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                },
                clearForm() { if(confirm('Limpar todos os campos?')) location.reload(); },
                sendWhatsApp() {
                    const empty = this.tenants.some(t => !t.cpf || !t.email || !t.phone);
                    if (empty || !this.property.cep || !this.values.rent) return alert('Por favor, preencha os campos obrigatórios (*)');
                    let tTxt = '';
                    this.tenants.forEach((t, i) => { tTxt += `👤 *LOCATÁRIO ${i+1}:*\nNome: ${t.name || '-'}\nCPF: ${t.cpf}\nEmail: ${t.email}\nCel: ${t.phone}\n\n`; });
                    const msg = `*COTAÇÃO: RIBERA*\n\nORIGEM: ${this.userType}\nATENDENTE: ${this.attendantName}\n\n${tTxt}🏠 *IMÓVEL:*\nTipo: ${this.property.type}\nCEP: ${this.property.cep}\nNº: ${this.property.number || '-'}\nFlex: ${this.property.flexCode || '-'}\n\n💰 *VALORES:*\nAluguel: ${this.values.rent}\nIPTU: ${this.values.iptu || 'R$ 0'}\nCond: ${this.values.condo || 'R$ 0'}\n\n_Enviado via App Ribera Seguros_`;
                    window.open(`https://wa.me/5515996367478?text=${encodeURIComponent(msg)}`, '_blank');
                }
            }
        }
    </script>
</body>
</html>
