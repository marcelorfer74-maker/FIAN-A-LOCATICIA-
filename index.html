<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ribera Fiança - Análise Ágil</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="https://ribera.io/wp-content/uploads/2019/11/logo_ribera_seguros.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input:focus { outline: none; border-color: #000; ring: 2px #000; }
        [x-cloak] { display: none !important; }
        .ribera-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-10" x-data="app()" x-cloak>

    <div class="max-w-md mx-auto px-4 pt-6">
        
        <header class="bg-white p-6 rounded-3xl mb-6 ribera-shadow border border-slate-100 relative overflow-hidden flex flex-col items-center">
            <div class="relative z-10 text-center">
                <img src="https://ribera.io/wp-content/uploads/2019/11/logo_ribera_seguros.png" alt="RIBERA" class="h-14 mb-2 mx-auto">
                <div class="h-[1px] w-full bg-slate-100 my-2"></div>
                <h1 class="text-xs font-black uppercase tracking-[0.2em] text-slate-800 italic">Fiança Locatícia Pro</h1>
            </div>
        </header>

        <div class="space-y-4">

            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-slate-400 mb-4">
                    <i data-lucide="user-cog" class="w-3 h-3 text-black"></i> Usuário e Atendimento
                </h2>
                <div class="grid gap-4">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Tipo de Perfil</label>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button @click="userType = 'Cliente'; attendantName = 'Atendimento'" :class="userType === 'Cliente' ? 'bg-black text-white shadow-md' : 'bg-slate-50 text-slate-400'" class="py-2.5 rounded-xl text-[11px] font-black uppercase transition-all">Cliente</button>
                            <button @click="userType = 'Imobiliária'" :class="userType === 'Imobiliária' ? 'bg-black text-white shadow-md' : 'bg-slate-50 text-slate-400'" class="py-2.5 rounded-xl text-[11px] font-black uppercase transition-all">Imobiliária</button>
                        </div>
                    </div>
                    
                    <div x-show="userType === 'Imobiliária'" x-transition class="animate-in fade-in slide-in-from-top-2 duration-300">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Atendente Ribera</label>
                        <select x-model="attendantName" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm mt-1 font-medium">
                            <option value="Beth">Beth</option>
                            <option value="Otalivio">Otalivio</option>
                            <option value="Paulo">Paulo</option>
                            <option value="Ribera">Ribera</option>
                            <option value="Atendimento">Outro Atendimento</option>
                        </select>
                    </div>
                </div>
            </section>
            
            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-slate-400">
                        <i data-lucide="users" class="w-3 h-3 text-black"></i> Locatários
                    </h2>
                    <span class="text-[9px] bg-black px-3 py-1 rounded-full font-black text-white" x-text="tenants.length + '/5'"></span>
                </div>

                <div class="space-y-4">
                    <template x-for="(tenant, index) in tenants" :key="index">
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 relative animate-in fade-in slide-in-from-top-2 duration-300">
                            <button @click="removeTenant(index)" x-show="tenants.length > 1" class="absolute -top-2 -right-2 bg-white text-red-500 p-2 rounded-full shadow-lg border border-slate-100 active:scale-90">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                            
                            <div class="grid gap-3">
                                <div>
                                    <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Nome Completo</label>
                                    <input type="text" x-model="tenant.name" placeholder="Nome do proponente" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm">
                                </div>
                                <div class="grid grid-cols-1 gap-3">
                                    <div class="grid grid-cols-2 gap-2">
                                        <div>
                                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">CPF *</label>
                                            <input type="tel" x-model="tenant.cpf" @input="maskCPF($event, index)" placeholder="000.000.000-00" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm" inputmode="numeric">
                                        </div>
                                        <div>
                                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">WhatsApp *</label>
                                            <input type="tel" x-model="tenant.phone" @input="maskPhone($event, index)" placeholder="(00) 00000-0000" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm" inputmode="tel">
                                        </div>
                                    </div>
                                    <div>
                                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">E-mail *</label>
                                        <input type="email" x-model="tenant.email" placeholder="email@exemplo.com" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <button @click="addTenant" x-show="tenants.length < 5" class="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-[10px] font-black uppercase hover:border-black hover:text-black transition-all flex items-center justify-center gap-2">
                        <i data-lucide="user-plus" class="w-4 h-4"></i> Adicionar Locatário
                    </button>
                </div>
            </section>

            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-slate-400 mb-4">
                    <i data-lucide="map-pin" class="w-3 h-3 text-black"></i> Dados do Imóvel
                </h2>
                
                <div class="grid gap-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">CEP *</label>
                            <input type="tel" x-model="property.cep" @input="maskCEP($event)" placeholder="00000-000" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm" inputmode="numeric">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Finalidade</label>
                            <select x-model="property.type" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm font-medium">
                                <option value="Residencial">Residencial</option>
                                <option value="Comercial">Comercial</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Número</label>
                            <input type="text" x-model="property.number" placeholder="Ex: 123" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Complemento</label>
                            <input type="text" x-model="property.complement" placeholder="Apto/Sala" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1 italic">Código Flex (Porto)</label>
                        <input type="text" x-model="property.flexCode" placeholder="Se possuir código promocional" class="w-full bg-amber-50/50 border border-amber-100 rounded-xl px-3 py-3 text-sm italic">
                    </div>
                </div>
            </section>

            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-slate-400 mb-4">
                    <i data-lucide="banknote" class="w-3 h-3 text-black"></i> Valores da Locação
                </h2>
                
                <div class="grid gap-3">
                    <div>
                        <label class="text-[9px] font-bold text-slate-900 uppercase ml-1">Aluguel Bruto *</label>
                        <input type="tel" x-model="values.rent" @input="maskCurrency($event, 'rent')" placeholder="R$ 0,00" class="w-full bg-slate-50 border border-slate-900/10 rounded-xl px-3 py-3 text-lg font-black text-black" inputmode="numeric">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">IPTU Mensal</label>
                            <input type="tel" x-model="values.iptu" @input="maskCurrency($event, 'iptu')" placeholder="R$ 0,00" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm" inputmode="numeric">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Condomínio</label>
                            <input type="tel" x-model="values.condo" @input="maskCurrency($event, 'condo')" placeholder="R$ 0,00" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm" inputmode="numeric">
                        </div>
                    </div>
                </div>
            </section>

            <div class="grid gap-3 pt-4">
                <button @click="sendWhatsApp" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase italic tracking-tighter shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="send" class="w-5 h-5"></i> Solicitar via Ribera
                </button>
                <button @click="clearForm" class="w-full bg-transparent text-slate-300 py-3 rounded-2xl font-bold text-[10px] uppercase tracking-widest transition-all">
                    Resetar Formulário
                </button>
            </div>

        </div>

        <footer class="mt-8 text-center pb-10">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em]">Ribera Corretora de Seguros | Marcelo Fernandes</p>
            <p class="text-[8px] text-slate-300 uppercase mt-1">SUSEP: 3H032J</p>
        </footer>
    </div>

    <script>
        function app() {
            return {
                userType: 'Cliente',
                attendantName: 'Atendimento',
                tenants: [{ name: '', cpf: '', email: '', phone: '' }],
                property: { cep: '', type: 'Residencial', number: '', complement: '', flexCode: '' },
                values: { rent: '', iptu: '', condo: '' },
                
                init() {
                    lucide.createIcons();
                },

                addTenant() {
                    if (this.tenants.length < 5) {
                        this.tenants.push({ name: '', cpf: '', email: '', phone: '' });
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                removeTenant(index) {
                    this.tenants.splice(index, 1);
                },

                maskCPF(e, index) {
                    let v = e.target.value.replace(/\D/g, '');
                    v = v.replace(/(\d{3})(\d)/, '$1.$2');
                    v = v.replace(/(\d{3})(\d)/, '$1.$2');
                    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                    this.tenants[index].cpf = v.substring(0, 14);
                },

                maskPhone(e, index) {
                    let v = e.target.value.replace(/\D/g, '');
                    v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                    v = v.replace(/(\d)(\d{4})$/, '$1-$2');
                    this.tenants[index].phone = v.substring(0, 15);
                },

                maskCEP(e) {
                    let v = e.target.value.replace(/\D/g, '');
                    v = v.replace(/^(\d{5})(\d)/, '$1-$2');
                    this.property.cep = v.substring(0, 9);
                },

                maskCurrency(e, field) {
                    let v = e.target.value.replace(/\D/g, '');
                    v = (v / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    this.values[field] = v;
                },

                clearForm() {
                    if(confirm('Limpar todos os campos?')) {
                        location.reload();
                    }
                },

                sendWhatsApp() {
                    const emptyTenant = this.tenants.some(t => !t.cpf || !t.email || !t.phone);
                    if (emptyTenant || !this.property.cep || !this.values.rent) {
                        alert('Por favor, preencha CPF, Email, Celular, CEP e Aluguel.');
                        return;
                    }

                    let tenantText = '';
                    this.tenants.forEach((t, i) => {
                        tenantText += `👤 *LOCATÁRIO ${i+1}:*\n`;
                        tenantText += `Nome: ${t.name || '-'}\n`;
                        tenantText += `CPF: ${t.cpf}\n`;
                        tenantText += `E-mail: ${t.email}\n`;
                        tenantText += `Cel: ${t.phone}\n\n`;
                    });

                    const message = `*COTAÇÃO: FIANÇA (RIBERA)*\n\n` +
                        `👤 *ORIGEM:* ${this.userType}\n` +
                        `🎧 *ATENDENTE:* ${this.attendantName}\n\n` +
                        tenantText +
                        `🏠 *DADOS DO IMÓVEL:*\n` +
                        `Tipo: ${this.property.type}\n` +
                        `CEP: ${this.property.cep}\n` +
                        `Número: ${this.property.number || '-'}\n` +
                        `Comp: ${this.property.complement || '-'}\n` +
                        `Cód Flex: ${this.property.flexCode || '-'}\n\n` +
                        `💰 *VALORES:* \n` +
                        `Aluguel: ${this.values.rent}\n` +
                        `IPTU: ${this.values.iptu || 'R$ 0,00'}\n` +
                        `Condomínio: ${this.values.condo || 'R$ 0,00'}\n\n` +
                        `_Enviado via App Ribera Seguros - Mestre Seguro360_`;

                    const phone = '5515996367478';
                    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
                }
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
