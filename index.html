<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ribera - Fiança Locatícia</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004691">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        input:focus, select:focus { outline: none; border-color: #004691; border-width: 2px; }
        [x-cloak] { display: none !important; }
        .porto-blue { background-color: #004691; }
    </style>
</head>
<body class="min-h-screen pb-10" x-data="app()" x-init="checkParams()" x-cloak>

    <div class="max-w-md mx-auto px-4 pt-6">
        
        <header class="porto-blue p-8 rounded-[32px] text-white mb-6 shadow-xl relative overflow-hidden flex flex-col items-center text-center border-b-4 border-amber-400">
            <div class="relative z-10" x-show="!isReturnMode">
                <h1 class="text-4xl font-black tracking-tighter leading-none uppercase">RIBERA</h1>
                <p class="text-[10px] font-bold uppercase tracking-[0.4em] mt-1 text-white/90">Corretora</p>
                <div class="h-[1px] w-12 bg-amber-400 mx-auto my-3"></div>
                <p class="text-lg font-medium lowercase tracking-tight text-amber-300 italic">fiança locatícia</p>
            </div>
            
            <div class="relative z-10" x-show="isReturnMode">
                <h1 class="text-2xl font-black tracking-tighter leading-none uppercase text-amber-400">STATUS DA ANÁLISE</h1>
                <p class="text-[10px] font-bold uppercase tracking-widest mt-2 text-white italic text-center">Retorno ao Atendimento</p>
            </div>
            <i class="fas fa-shield-halved absolute -right-4 -bottom-4 w-24 h-24 opacity-10 rotate-12 text-white"></i>
        </header>

        <div class="space-y-4">
            
            <template x-if="isReturnMode">
                <div class="bg-white p-6 rounded-3xl shadow-xl border-2 border-amber-400 text-center">
                    <i class="fas fa-paper-plane text-5xl mb-4" style="color: #004691;"></i>
                    <h3 class="font-black text-xl uppercase italic mb-2" style="color: #004691;">Resultado da Ficha</h3>
                    <p class="text-xs text-slate-500 mb-6 uppercase">Cliente: <strong class="text-slate-900" x-text="clientName"></strong></p>

                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200 space-y-3 mb-6 text-left">
                        <div>
                            <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Seguradora</label>
                            <div class="grid grid-cols-2 gap-3 mt-2">
                                <button
                                    type="button"
                                    @click="returnForm.insurer = 'PORTO SEGURO'"
                                    :class="returnForm.insurer === 'PORTO SEGURO' ? 'border-[#004691] ring-2 ring-[#004691]/15 bg-white' : 'border-slate-200 bg-white'"
                                    class="rounded-xl border p-3 flex flex-col items-center justify-center gap-3 transition-all"
                                >
                                    <img src="ativos/porto-seguro.svg" alt="Porto Seguro" class="h-10 w-auto object-contain">
                                    <span class="text-[11px] font-black text-slate-700 uppercase text-center">Porto Seguro</span>
                                </button>
                                <button
                                    type="button"
                                    @click="returnForm.insurer = 'TOKIO MARINE'"
                                    :class="returnForm.insurer === 'TOKIO MARINE' ? 'border-[#004691] ring-2 ring-[#004691]/15 bg-white' : 'border-slate-200 bg-white'"
                                    class="rounded-xl border p-3 flex flex-col items-center justify-center gap-3 transition-all"
                                >
                                    <img src="ativos/tokio-marine.svg" alt="Tokio Marine" class="h-10 w-auto object-contain">
                                    <span class="text-[11px] font-black text-slate-700 uppercase text-center">Tokio Marine</span>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Valor Mensal do Seguro</label>
                            <input type="tel" x-model="returnForm.monthlyValue" @input="maskReturnCurrency($event)" placeholder="R$ 0,00" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-4 text-sm mt-1 font-bold text-slate-700">
                        </div>
                    </div>
                    
                    <div class="space-y-3">
                        <button @click="confirmReturn('aprovado')" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg flex items-center justify-center gap-3">
                            <i class="fas fa-check-circle text-xl"></i> Aprovado / Solicitar Biometria
                        </button>
                        <button @click="confirmReturn('recusado')" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg flex items-center justify-center gap-3">
                            <i class="fas fa-times-circle text-xl"></i> Ficha Recusada
                        </button>
                    </div>
                    <button @click="isReturnMode = false" class="w-full text-slate-400 py-3 mt-4 text-[10px] uppercase font-bold">Voltar ao Início</button>
                </div>
            </template>

            <div x-show="!isReturnMode" class="space-y-4">
                
                <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4 font-bold">Origem</h2>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button @click="userType = 'Cliente'; if(!fixedAttendant) attendantName = 'Atendimento'" :class="userType === 'Cliente' ? 'porto-blue text-white shadow-md' : 'bg-slate-100 text-slate-400'" class="py-3 rounded-xl text-[11px] font-black uppercase transition-all">Cliente</button>
                        <button @click="userType = 'Imobiliária'" :class="userType === 'Imobiliária' ? 'porto-blue text-white shadow-md' : 'bg-slate-100 text-slate-400'" class="py-3 rounded-xl text-[11px] font-black uppercase transition-all">Imobiliária</button>
                    </div>
                    
                    <div x-show="userType === 'Imobiliária' || fixedAttendant" x-transition>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1 italic font-bold">Atendente Ribera</label>
                        <select x-model="attendantName" :disabled="fixedAttendant" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-4 text-sm font-bold text-slate-700 mt-1">
                            <option value="Beth">Beth Camargo</option>
                            <option value="Ribera">Ribera (Recepção)</option>
                            <option value="Paulo">Paulo</option>
                            <option value="Otalivio">Otálivio</option>
                            <option value="Geral">Atendimento Geral</option>
                        </select>
                    </div>
                </section>
                
                <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4 font-bold">1. Locatários</h2>
                    <template x-for="(tenant, index) in tenants" :key="index">
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 relative mb-4">
                            <button @click="removeTenant(index)" x-show="tenants.length > 1" class="absolute -top-2 -right-2 bg-white text-red-500 p-2 rounded-full shadow-md border"><i class="fas fa-trash-can text-xs"></i></button>
                            <input type="text" x-model="tenant.name" placeholder="Nome Completo" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm mb-2 uppercase font-semibold">
                            <div class="grid grid-cols-2 gap-2 mb-2">
                                <input type="tel" x-model="tenant.cpf" @input="maskCPF($event, index)" placeholder="CPF *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm" maxlength="14">
                                <input type="tel" x-model="tenant.phone" @input="maskPhone($event, index)" placeholder="WhatsApp *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm" maxlength="15">
                            </div>
                            <input type="email" x-model="tenant.email" placeholder="E-mail *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm uppercase">
                        </div>
                    </template>
                    <button @click="addTenant" x-show="tenants.length < 5" class="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-[10px] font-black uppercase flex items-center justify-center gap-2"><i class="fas fa-plus"></i> Novo Locatário</button>
                </section>

                <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4 font-bold">2. Dados do Imóvel</h2>
                    <div class="grid gap-3">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="tel" x-model="property.cep" @input="maskCEP($event)" placeholder="CEP *" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm" maxlength="9">
                            <select x-model="property.type" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm font-bold text-slate-700">
                                <optgroup label="Residencial"><option value="Casa">Casa</option><option value="Apartamento">Apartamento</option></optgroup>
                                <optgroup label="Comercial"><option value="Sala">Sala</option><option value="Salão">Salão</option><option value="Galpão">Galpão</option></optgroup>
                            </select>
                        </div>

                        <div x-show="isComercial()" x-transition class="bg-blue-50 p-4 rounded-2xl border border-blue-100 space-y-3">
                            <p class="text-[10px] font-black porto-text uppercase tracking-widest text-center">Empresa Responsável</p>
                            <div>
                                <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Possui CNPJ?</label>
                                <div class="grid grid-cols-2 gap-2 mt-1">
                                    <button @click="comercial.hasCNPJ = true" :class="comercial.hasCNPJ ? 'porto-blue text-white' : 'bg-white text-slate-400'" class="py-2 rounded-lg text-[10px] font-bold uppercase shadow-sm">Sim</button>
                                    <button @click="comercial.hasCNPJ = false" :class="!comercial.hasCNPJ ? 'porto-blue text-white' : 'bg-white text-slate-400'" class="py-2 rounded-lg text-[10px] font-bold uppercase shadow-sm">Não</button>
                                </div>
                            </div>
                            <div x-show="comercial.hasCNPJ" class="grid grid-cols-2 gap-2" x-transition>
                                <input type="tel" x-model="comercial.cnpj" @input="maskCNPJ($event)" placeholder="CNPJ *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm" maxlength="18">
                                <input type="text" x-model="comercial.abertura" placeholder="Tempo Abertura *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm">
                            </div>
                            <div x-show="comercial.hasCNPJ" class="space-y-2" x-transition>
                                <input type="tel" x-model="comercial.cpfTitular" @input="maskCPFTitular($event)" placeholder="CPF Titular *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm" maxlength="14">
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="tel" x-model="comercial.celTitular" @input="maskCelTitular($event)" placeholder="Celular Titular *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm" maxlength="15">
                                    <input type="email" x-model="comercial.emailTitular" placeholder="E-mail Titular *" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm uppercase">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" x-model="property.number" placeholder="Número" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm">
                            <input type="text" x-model="property.complement" placeholder="Comp./Apto" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" x-model="property.internalCode" placeholder="Cód. Imobiliária" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm italic">
                            <input type="text" x-model="property.flexCode" placeholder="Cód. Flex Porto" class="w-full bg-amber-50 border border-amber-100 rounded-xl px-3 py-3 text-sm italic">
                        </div>
                        <label class="text-[9px] font-black porto-text uppercase ml-1 italic">Aluguel Bruto *</label>
                        <input type="tel" x-model="values.rent" @input="maskCurrency($event, 'rent')" placeholder="R$ 0,00" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-4 text-xl font-black porto-text">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="tel" x-model="values.iptu" @input="maskCurrency($event, 'iptu')" placeholder="IPTU R$" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm">
                            <input type="tel" x-model="values.condo" @input="maskCurrency($event, 'condo')" placeholder="Cond. R$" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm">
                        </div>
                    </div>
                </section>

                <button @click="sendToMarcelo" class="w-full porto-blue text-white py-5 rounded-3xl font-black uppercase italic shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i class="fab fa-whatsapp text-xl"></i> Enviar p/ Marcelo
                </button>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                userType: 'Imobiliária', attendantName: 'Beth', fixedAttendant: false,
                tenants: [{ name: '', cpf: '', phone: '', email: '' }],
                property: { cep: '', type: 'Casa', number: '', complement: '', internalCode: '', flexCode: '' },
                comercial: { hasCNPJ: false, cnpj: '', abertura: '', cpfTitular: '', celTitular: '', emailTitular: '' },
                returnForm: { insurer: '', monthlyValue: '' },
                values: { rent: '', iptu: '', condo: '' }, isReturnMode: false, clientName: '',
                contacts: { 'Beth': '5515988407007', 'Ribera': '5515997489093', 'Paulo': '5515992791441', 'Otalivio': '5515996007933', 'Geral': '551532321545', 'Atendimento': '5515996367478' },
                
                isComercial() { return ['Sala', 'Salão', 'Galpão'].includes(this.property.type); },
                getSelectedInsurer() { return this.returnForm.insurer; },
                onlyDigits(value) { return String(value || '').replace(/\D/g, ''); },
                hasText(value) { return String(value || '').trim().length > 0; },
                hasRequiredMainFields() {
                    const mainTenant = this.tenants[0] || {};
                    return this.onlyDigits(mainTenant.cpf).length === 11 &&
                        this.hasText(mainTenant.email) &&
                        this.onlyDigits(this.property.cep).length === 8 &&
                        this.onlyDigits(this.values.rent).length > 0;
                },
                checkParams() {
                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.has('retorno')) {
                        this.isReturnMode = true;
                        this.attendantName = urlParams.get('atendente');
                        this.clientName = urlParams.get('cliente');
                    } else if (urlParams.has('atendente')) {
                        this.attendantName = urlParams.get('atendente');
                        this.fixedAttendant = true;
                    }
                },
                addTenant() { if (this.tenants.length < 5) this.tenants.push({ name: '', cpf: '', phone: '', email: '' }); },
                removeTenant(index) { if(this.tenants.length > 1) this.tenants.splice(index, 1); },
                maskCPF(e, i) { let v = e.target.value.replace(/\D/g, '').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2'); this.tenants[i].cpf = v.substring(0,14); },
                maskPhone(e, i) { let v = e.target.value.replace(/\D/g, '').replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d)(\d{4})$/, '$1-$2'); this.tenants[i].phone = v.substring(0,15); },
                maskCNPJ(e) { let v = e.target.value.replace(/\D/g, '').replace(/^(\d{2})(\d)/, '$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3').replace(/\.(\d{3})(\d)/, '.$1/$2').replace(/(\d{4})(\d)/, '$1-$2'); this.comercial.cnpj = v.substring(0,18); },
                maskCPFTitular(e) { let v = e.target.value.replace(/\D/g, '').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2'); this.comercial.cpfTitular = v.substring(0,14); },
                maskCelTitular(e) { let v = e.target.value.replace(/\D/g, '').replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d)(\d{4})$/, '$1-$2'); this.comercial.celTitular = v.substring(0,15); },
                maskCEP(e) { this.property.cep = e.target.value.replace(/\D/g, '').replace(/^(\d{5})(\d)/, '$1-$2').substring(0,9); },
                maskCurrency(e, f) { this.values[f] = (e.target.value.replace(/\D/g, '')/100).toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); },
                maskReturnCurrency(e) { this.returnForm.monthlyValue = (e.target.value.replace(/\D/g, '')/100).toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); },
                
                sendToMarcelo() {
                    if (!this.hasRequiredMainFields()) {
                        alert('⚠️ Informe CPF, E-mail, CEP e Aluguel do titular.'); return;
                    }
                    if (this.isComercial() && this.comercial.hasCNPJ && (this.onlyDigits(this.comercial.cnpj).length !== 14 || this.onlyDigits(this.comercial.cpfTitular).length !== 11)) {
                        alert('⚠️ Para análise com CNPJ, informe o número do CNPJ e o CPF do Titular.'); return;
                    }

                    const firstTenant = this.tenants[0].name || 'Cliente';
                    const baseUrl = window.location.href.split('?')[0];
                    const returnLink = `${baseUrl}?retorno=1&atendente=${this.attendantName}&cliente=${encodeURIComponent(firstTenant)}`;
                    
                    let tTxt = '';
                    this.tenants.forEach((t, i) => { if(t.cpf) tTxt += `👤 *LOC ${i+1}:* ${t.name.toUpperCase()}\nCPF: ${t.cpf}\nWhats: ${t.phone}\nE-mail: ${t.email.toLowerCase()}\n\n`; });
                    
                    let comTxt = '';
                    if(this.isComercial()){
                        comTxt = `🏢 *COMERCIAL:*\nCNPJ: ${this.comercial.hasCNPJ ? this.comercial.cnpj : 'NÃO POSSUI'}\nTempo: ${this.comercial.abertura || '-'}\n` +
                                 (this.comercial.hasCNPJ ? `Titular CPF: ${this.comercial.cpfTitular}\nTitular Cel: ${this.comercial.celTitular}\nTitular Email: ${this.comercial.emailTitular}\n\n` : '');
                    }

                    const chargesTxt = `${this.values.iptu ? `IPTU: ${this.values.iptu}\n` : ''}${this.values.condo ? `Condomínio: ${this.values.condo}\n` : ''}`;
                    const msg = `*NOVA ANÁLISE: RIBERA*\n\nORIGEM: ${this.userType}\nATENDENTE: ${this.attendantName}\n\n${tTxt}${comTxt}🏠 *IMÓVEL:* ${this.property.type}\nCEP: ${this.property.cep}\nNº: ${this.property.number || '-'}\n💰 *ALUGUEL:* ${this.values.rent}\n${chargesTxt}\n✅ *RETORNO:* ${returnLink}`;
                    window.open(`https://wa.me/5515996367478?text=${encodeURIComponent(msg)}`, '_blank');
                },

                confirmReturn(status) {
                    if (status === 'aprovado') {
                        const insurer = this.getSelectedInsurer();
                        if (!insurer || !this.returnForm.monthlyValue) {
                            alert('⚠️ Informe a seguradora e o valor mensal do seguro.'); return;
                        }
                    }

                    let msg = (status === 'aprovado')
                        ? `*📢 RETORNO RIBERA (APROVADO)*\n\nOlá *${this.attendantName}*,\nA ficha do cliente *${this.clientName}* foi aprovada.\n\n🏦 *SEGURADORA:* ${this.getSelectedInsurer()}\n💳 *VALOR MENSAL:* ${this.returnForm.monthlyValue}\n\n⚠️ *PRÓXIMO PASSO:* Solicitar a biometria facial para continuidade do processo.`
                        : `*📢 RETORNO RIBERA (STATUS)*\n\nOlá *${this.attendantName}*,\nA ficha do cliente *${this.clientName}* não foi aprovada.\n\n⚠️ *AÇÃO:* Fale com o Marcelo para detalhes.`;
                    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
                }
            }
        }
    </script>
</body>
</html>
